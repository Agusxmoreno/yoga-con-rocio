---
layout: default
title: Blog
---
<style>
  @font-face {
    font-family: 'ShinyMarker';
    src: url('/Shiny_Marker_Regular.otf') format('opentype');
  }
  @font-face {
    font-family: 'SundayMorning';
    src: url('/SUNDAY_MORNING.OTF') format('opentype');
  }

  .blog-hero {
    background: #627356;
    padding: 120px 60px 80px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 40vh;
  }

  .blog-hero-ilu {
    position: absolute;
    pointer-events: none;
    opacity: 1;
  }

  .blog-hero-ilu--sol {
    width: 100px;
    left: 6%;
    top: 50%;
    transform: translateY(-50%);
    animation: float 6s ease-in-out infinite;
  }

  .blog-hero-ilu--planeta {
    width: 80px;
    right: 8%;
    top: 20%;
    animation: float 4s ease-in-out infinite;
  }

  .blog-hero-ilu--gota {
    width: 90px;
    right: 5%;
    bottom: 15%;
    animation: sway 5s ease-in-out infinite;
    transform-origin: bottom center;
  }

  .blog-hero-ilu--hoja {
    width: 70px;
    left: 12%;
    bottom: 10%;
    animation: sway 2s ease-in-out infinite;
    transform-origin: bottom center;
  }

  .blog-hero-inner {
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .blog-hero-label {
    font-family: 'ShinyMarker', serif;
    font-size: 18px;
    letter-spacing: 0.12em;
    color: #b6bf93;
    display: block;
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .blog-hero-label.visible { opacity: 1; transform: translateY(0); }

  .blog-hero-titulo {
    font-family: 'SundayMorning', serif;
    font-size: clamp(52px, 10vw, 120px);
    color: #f2e2c4;
    line-height: 1;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease 0.15s, transform 0.8s ease 0.15s;
  }

  .blog-hero-titulo.visible { opacity: 1; transform: translateY(0); }

  .blog-grid-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 80px 120px 100px;
  }

  .blog-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
  }

  .blog-card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s ease, transform 0.7s ease, box-shadow 0.3s ease;
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .blog-card.visible { opacity: 1; transform: translateY(0); }
  .blog-card:hover { box-shadow: 0 12px 36px rgba(61,32,16,0.12); }

  .blog-card-img {
    width: 100%;
    aspect-ratio: 16/10;
    overflow: hidden;
    background: #d4c8b8;
  }

  .blog-card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
  }

  .blog-card:hover .blog-card-img img { transform: scale(1.05); }

  .blog-card-body {
    padding: 24px 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .blog-card-fecha {
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: #b6bf93;
    text-transform: uppercase;
  }

  .blog-card-titulo {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    font-weight: 500;
    color: #3d2010;
    line-height: 1.4;
  }

  .blog-card-desc {
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    color: #7a5c48;
  }

  .blog-card-link {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: #627356;
    margin-top: 4px;
  }

  .blog-card:hover .blog-card-link { color: #bf612a; }

  @keyframes sway {
    0%, 100% { transform: rotate(-6deg); }
    50%       { transform: rotate(6deg); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-12px); }
  }

  @media (max-width: 900px) {
    .blog-hero { padding: 100px 24px 60px; }
    .blog-grid-wrap { padding: 48px 24px 60px; }
    .blog-grid { grid-template-columns: 1fr; }
    .blog-hero-ilu--sol { width: 80px; left: 6%; top: 60%; }
    .blog-hero-ilu--hoja { width: 40px; left: 25%; bottom: 10%; }
  }
</style>

<!-- HERO -->
<header class="blog-hero">
  <img src="/img/logo-rocio.svg"  class="blog-hero-ilu blog-hero-ilu--sol"     alt="" aria-hidden="true" />
  <img src="/img/alga.svg"        class="blog-hero-ilu blog-hero-ilu--planeta"  alt="" aria-hidden="true" />
  <img src="/img/Shanti_1.png"    class="blog-hero-ilu blog-hero-ilu--gota"     alt="" aria-hidden="true" />
  <img src="/img/estrella.svg"    class="blog-hero-ilu blog-hero-ilu--hoja"     alt="" aria-hidden="true" />
  <div class="blog-hero-inner">
    <span class="blog-hero-label">Reflexiones y aprendizajes</span>
    <h1 class="blog-hero-titulo">Blog</h1>
  </div>
</header>

<!-- GRID DE POSTS — generado automáticamente por Jekyll -->
<main class="blog-grid-wrap">
  <div class="blog-grid">
    {% for post in site.posts %}
    <a href="{{ post.url }}" class="blog-card">
      <div class="blog-card-img">
        <img src="{{ post.image }}" alt="{{ post.title }}" />
      </div>
      <div class="blog-card-body">
        <p class="blog-card-fecha">{{ post.date | date: "%d %B %Y" }}</p>
        <h2 class="blog-card-titulo">{{ post.title }}</h2>
        <p class="blog-card-desc">{{ post.description }}</p>
        <span class="blog-card-link">Leer más →</span>
      </div>
    </a>
    {% endfor %}
  </div>
</main>

<script>
  window.addEventListener('load', () => {
    document.querySelector('.blog-hero-label')?.classList.add('visible');
    setTimeout(() => document.querySelector('.blog-hero-titulo')?.classList.add('visible'), 200);
  });

  const cards = document.querySelectorAll('.blog-card');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });

  cards.forEach(c => observer.observe(c));
</script>
