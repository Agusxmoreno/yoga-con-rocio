<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Yoga con Rocío</title>
  <link rel="icon" type="image/svg+xml" href="/img/espiral.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/blog.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <nav>
    <ul>
      <li><a href="/#inicio">Inicio</a></li>
      <li><a href="/#clases">Clases</a></li>
      <li><a href="/#sobre-mi">Sobre mí</a></li>
      <li><a href="/#galeria">Galería</a></li>
      <li><a href="/blog/blog.html">Blog</a></li>
      <li><a href="/#contacto">Contacto</a></li>
    </ul>
  </nav>

  <button class="hamburger" onclick="openMenu()" aria-label="Abrir menú">
    <span></span><span></span><span></span>
  </button>

  <div class="mobile-menu" id="mobileMenu">
    <button class="close-btn" onclick="closeMenu()">✕</button>
    <a href="/#inicio"        onclick="closeMenu()">Inicio</a>
    <a href="/#clases"        onclick="closeMenu()">Clases</a>
    <a href="/#sobre-mi"      onclick="closeMenu()">Sobre mí</a>
    <a href="/#galeria"       onclick="closeMenu()">Galería</a>
    <a href="/blog/blog.html" onclick="closeMenu()">Blog</a>
    <a href="/#contacto"      onclick="closeMenu()">Contacto</a>
  </div>

  <article>

    <!-- hero oscuro con título -->
    <div class="post-hero">
      <img src="/img/espiral.svg"  class="post-hero-ilu post-hero-ilu--sol"  alt="" aria-hidden="true" />
      <img src="/img/alga.svg"     class="post-hero-ilu post-hero-ilu--hoja" alt="" aria-hidden="true" />

      <div class="post-hero-inner">
        <span class="post-categoria">Blog</span>
        <h1 class="post-titulo">{{ page.title }}</h1>
        <span class="post-fecha">{{ page.date | date: "%d %B %Y" }}</span>
        <div class="post-cover-wrap">
          <img class="post-cover" src="{{ page.image }}" alt="{{ page.title }}" />
        </div>
      </div>
    </div>

    <div class="post-wrap">
      <div class="post-content">
        {{ content }}
      </div>

      <div class="post-footer">
        <a href="/blog/blog.html" class="post-btn post-btn--blog"> Ver todos los posts</a>
        <a href="/" class="post-btn post-btn--inicio">Volver al inicio</a>
      </div>
    </div>

  </article>

  <!-- WhatsApp flotante -->
  <a href="https://wa.me/34627546891?text=Hola%20Roc%C3%ADo%2C%20me%20gustar%C3%ADa%20info%20sobre%20las%20clases"
    target="_blank" rel="noopener" aria-label="Contactar por WhatsApp"
    style="position:fixed;bottom:28px;right:28px;z-index:999;width:52px;height:52px;background:#25d366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,211,102,0.4);transition:transform 0.2s;"
    onmouseover="this.style.transform='scale(1.1)'"
    onmouseout="this.style.transform='scale(1)'">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
    </svg>
  </a>

  <script src="/js/blog.js"></script>
</body>
</html>
